<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>djay Blogs Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">d</span>
        <span>djay Blogs Admin</span>
      </a>
      <nav class="nav" aria-label="Admin navigation">
        <a href="index.html">View site</a>
        <a href="https://github.com/Dhananjayji/djayblogs" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </header>

    <main class="admin-main">
      <section class="writer admin-panel" aria-labelledby="loginTitle">
        <div class="section-heading">
          <p class="eyebrow">Private editor</p>
          <h1 id="loginTitle">Edit your published blogs</h1>
        </div>

        <form id="tokenForm" class="draft-form admin-token-form">
          <label>
            GitHub fine-grained token
            <input
              id="githubToken"
              type="password"
              autocomplete="off"
              placeholder="Paste token with repository Contents read/write access"
              required
            />
          </label>
          <div class="form-actions">
            <button class="button primary" type="submit">Connect</button>
            <button class="button secondary" id="forgetToken" type="button">Forget token</button>
          </div>
        </form>
        <p class="admin-help">
          The token stays in this browser only. Do not use this editor from a shared computer.
        </p>
      </section>

      <section class="content-grid admin-layout" aria-live="polite">
        <aside class="sidebar admin-sidebar">
          <section class="about">
            <p class="eyebrow">Posts</p>
            <div id="adminPosts" class="admin-post-list"></div>
          </section>
        </aside>

        <section class="writer admin-editor" aria-labelledby="editorTitle">
          <div class="section-heading">
            <p class="eyebrow">Editor</p>
            <h2 id="editorTitle">New post</h2>
          </div>

          <form id="postForm" class="draft-form">
            <label>
              Title
              <input id="postTitle" type="text" required />
            </label>
            <label>
              Topic
              <input id="postTopic" type="text" required />
            </label>
            <label>
              Date
              <input id="postDate" type="date" required />
            </label>
            <label>
              Read time
              <input id="postReadTime" type="text" placeholder="3 min read" required />
            </label>
            <label>
              Excerpt
              <textarea id="postExcerpt" rows="3" required></textarea>
            </label>
            <label>
              Content
              <textarea id="postContent" rows="10" required></textarea>
            </label>
            <div class="form-actions">
              <button class="button primary" type="submit">Publish changes</button>
              <button class="button secondary" id="newPost" type="button">New post</button>
              <button class="button danger" id="deletePost" type="button">Delete post</button>
            </div>
          </form>
          <p id="adminStatus" class="admin-status" role="status"></p>
        </section>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
